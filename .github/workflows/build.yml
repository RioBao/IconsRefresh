name: build

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'master'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: Prepare
        id: prepare
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=snapshot" >> "$GITHUB_OUTPUT"
          fi
          echo "source_date_epoch=$(git log -1 --pretty=%ct || date +%s)" >> "$GITHUB_OUTPUT"
        shell: bash
      -
        name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      -
        name: Mage build
        uses: magefile/mage-action@v3
        env:
          SOURCE_DATE_EPOCH: ${{ steps.prepare.outputs.source_date_epoch }}
        with:
          version: latest
          args: build
      -
        name: Checksums
        run: |
          cd bin
          sha256sum IconsRefresh.exe IconsRefreshUI.exe > checksums.txt
      -
        name: GitHub Release
        uses: softprops/action-gh-release@v2
        if: success() && startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          generate_release_notes: true
          files: |
            bin/IconsRefresh.exe
            bin/IconsRefreshUI.exe
            bin/checksums.txt
          name: v${{ steps.prepare.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
